<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Slide Deck - Parenting AI (Slides 1-5)</title>
  <style>
    :root{
      --bg:#e9edf2;
      --panel:#ffffff;
      --text:#173b72;
      --muted:#6b7a90;
      --shadow:0 20px 60px rgba(19,39,72,.18);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(180deg,#edf2f7 0%,#e3e9f1 100%);color:#111}
    body{display:flex;flex-direction:column}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:rgba(255,255,255,.72);backdrop-filter:blur(12px);border-bottom:1px solid rgba(19,39,72,.08);position:sticky;top:0;z-index:5}
    .title{font-weight:700;color:var(--text);font-size:16px}
    .hint{font-size:13px;color:var(--muted)}
    .viewer{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
    .stage{position:relative;width:min(96vw,1600px);aspect-ratio:16/9;background:#f7f8fb;border-radius:calc(var(--radius) + 6px);box-shadow:var(--shadow);overflow:hidden}
    .slide{position:absolute;inset:0;display:none;background:#fff}
    .slide.active{display:block}
    .slide img{width:100%;height:100%;object-fit:contain;background:#fff}
    .nav{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:space-between;padding:18px}
    .btn{pointer-events:auto;border:none;background:rgba(255,255,255,.85);color:var(--text);width:46px;height:46px;border-radius:999px;box-shadow:0 8px 24px rgba(23,59,114,.14);font-size:22px;font-weight:700;cursor:pointer}
    .btn:hover{transform:translateY(-1px)}
    .counter{position:absolute;right:18px;bottom:16px;background:rgba(255,255,255,.88);color:var(--text);padding:8px 12px;border-radius:999px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(23,59,114,.12)}
    .thumbs{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;padding:0 24px 22px}
    .thumb{border:none;padding:0;border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 6px 18px rgba(23,59,114,.12);cursor:pointer;outline:2px solid transparent}
    .thumb.active{outline-color:#3c68ad}
    .thumb img{display:block;width:100%;aspect-ratio:16/9;object-fit:cover}
    .thumb span{display:block;padding:8px 10px;font-size:12px;font-weight:700;color:var(--text);text-align:left}
    @media (max-width: 900px){
      .viewer{padding:12px}
      .thumbs{grid-template-columns:repeat(2,minmax(0,1fr))}
      .hint{display:none}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <div class="title">HTML Slide Deck • Slides 1–5</div>
      <div class="hint">← → để chuyển slide • F để fullscreen</div>
    </div>
    <div class="hint">Built from generated mockup panels</div>
  </div>

  <div class="viewer">
    <div class="stage" id="stage">
      <section class="slide active"><img src="assets/s1.png" alt="Slide 1 cover" /></section>
      <section class="slide"><img src="assets/s2.png" alt="Slide 2 hook" /></section>
      <section class="slide"><img src="assets/s3.png" alt="Slide 3 pain points" /></section>
      <section class="slide"><img src="assets/s4.png" alt="Slide 4 context" /></section>
      <section class="slide"><img src="assets/s5.png" alt="Slide 5 evidence" /></section>
      <div class="nav">
        <button class="btn" id="prev" aria-label="Previous slide">‹</button>
        <button class="btn" id="next" aria-label="Next slide">›</button>
      </div>
      <div class="counter" id="counter">1 / 5</div>
    </div>
  </div>

  <div class="thumbs" id="thumbs">
    <button class="thumb active" data-index="0"><img src="assets/s1.png" alt="thumb 1"><span>01 Cover</span></button>
    <button class="thumb" data-index="1"><img src="assets/s2.png" alt="thumb 2"><span>02 Hook</span></button>
    <button class="thumb" data-index="2"><img src="assets/s3.png" alt="thumb 3"><span>03 Pain points</span></button>
    <button class="thumb" data-index="3"><img src="assets/s4.png" alt="thumb 4"><span>04 Context</span></button>
    <button class="thumb" data-index="4"><img src="assets/s5.png" alt="thumb 5"><span>05 Evidence</span></button>
  </div>

  <script>
    const slides = [...document.querySelectorAll('.slide')];
    const thumbs = [...document.querySelectorAll('.thumb')];
    const counter = document.getElementById('counter');
    const stage = document.getElementById('stage');
    let current = 0;

    function render(index){
      current = (index + slides.length) % slides.length;
      slides.forEach((el,i)=>el.classList.toggle('active', i===current));
      thumbs.forEach((el,i)=>el.classList.toggle('active', i===current));
      counter.textContent = `${current + 1} / ${slides.length}`;
    }

    document.getElementById('prev').onclick = ()=>render(current - 1);
    document.getElementById('next').onclick = ()=>render(current + 1);
    thumbs.forEach(btn=>btn.onclick = ()=>render(Number(btn.dataset.index)));

    window.addEventListener('keydown', (e)=>{
      if(['ArrowRight','PageDown',' '].includes(e.key)){ e.preventDefault(); render(current + 1); }
      if(['ArrowLeft','PageUp'].includes(e.key)){ e.preventDefault(); render(current - 1); }
      if(e.key.toLowerCase()==='f'){
        if (!document.fullscreenElement) stage.requestFullscreen?.();
        else document.exitFullscreen?.();
      }
    });
  </script>
</body>
</html>
